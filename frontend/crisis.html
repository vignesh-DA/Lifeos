<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="LIFEOS Crisis Mode — Emergency battle plan for last-minute tasks.">
    <title>🚨 CRISIS MODE — LIFEOS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="crisis-bg text-white min-h-screen">

    <!-- Crisis Top Bar -->
    <div class="bg-red-950/50 border-b border-red-500/20 px-6 py-3">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="text-xl animate-heartbeat">🚨</span>
                <span class="font-bold text-red-400">CRISIS MODE</span>
            </div>
            <a href="dashboard.html" class="text-sm text-slate-400 hover:text-white transition-colors">
                ✕ Exit Crisis
            </a>
        </div>
    </div>

    <!-- Progress Bar -->
    <div class="progress-bar crisis" style="position: sticky; top: 0; z-index: 40; border-radius: 0;">
        <div id="crisisProgress" class="progress-fill" style="width: 0%;"></div>
    </div>

    <!-- Setup Phase -->
    <div id="setupPhase" class="max-w-2xl mx-auto px-6 py-12">
        <div class="text-center mb-8 animate-slide-up">
            <div class="text-5xl mb-4 animate-heartbeat">⏰</div>
            <h1 class="text-3xl font-bold text-red-400">What's the emergency?</h1>
            <p class="text-slate-400 mt-2">Tell me what you need to finish and how much time you have.</p>
        </div>

        <div class="space-y-4 animate-slide-up delay-2">
            <div>
                <label class="text-sm text-slate-400 mb-1 block">Task / Assignment</label>
                <input id="crisisTask" class="input-dark" placeholder="e.g., ML Assignment submission"
                       style="border-color: rgba(239, 68, 68, 0.3);">
            </div>
            <div>
                <label class="text-sm text-slate-400 mb-1 block">Description (optional)</label>
                <textarea id="crisisDesc" class="input-dark" rows="2" placeholder="Any details about the task..."
                          style="border-color: rgba(239, 68, 68, 0.3);"></textarea>
            </div>
            <div>
                <label class="text-sm text-slate-400 mb-1 block">Minutes Available</label>
                <div class="flex gap-3">
                    <button onclick="setMinutes(30)" class="btn-ghost flex-1 border-red-500/30 text-red-300">30 min</button>
                    <button onclick="setMinutes(60)" class="btn-ghost flex-1 border-red-500/30 text-red-300">1 hour</button>
                    <button onclick="setMinutes(90)" class="btn-ghost flex-1 border-red-500/30 text-red-300">90 min</button>
                    <button onclick="setMinutes(120)" class="btn-ghost flex-1 border-red-500/30 text-red-300">2 hours</button>
                </div>
                <input id="crisisMinutes" type="number" class="input-dark mt-2" placeholder="Or enter custom minutes"
                       value="60" style="border-color: rgba(239, 68, 68, 0.3);">
            </div>

            <button id="generateBtn" onclick="startCrisis()" class="btn-crisis w-full justify-center py-5 text-xl mt-4">
                ⚡ GENERATE BATTLE PLAN
            </button>
        </div>
    </div>

    <!-- Loading Phase -->
    <div id="loadingPhase" class="hidden max-w-2xl mx-auto px-6 py-16 text-center">
        <div class="text-6xl mb-6" style="animation: spin 1s linear infinite; display:inline-block;">⚙️</div>
        <h2 class="text-2xl font-bold text-red-400 mb-3">Generating Battle Plan...</h2>
        <p class="text-slate-400 mb-8">AI is crafting your survival strategy</p>
        <div style="background: rgba(239,68,68,0.1); border-radius: 9999px; height: 6px; overflow: hidden;">
            <div id="loadingBar" style="height: 100%; background: linear-gradient(90deg, #EF4444, #F97316); border-radius: 9999px; width: 0%; transition: width 0.3s ease;"></div>
        </div>
        <p id="loadingStatus" class="text-xs text-slate-500 mt-3">Analyzing task complexity...</p>
    </div>

    <!-- Battle Plan Phase -->
    <div id="battlePhase" class="hidden">
        <div class="max-w-3xl mx-auto px-6 py-8">

            <!-- Timer -->
            <div class="text-center mb-8 animate-slide-up">
                <div id="crisisTimer" class="crisis-timer">00:00</div>
                <div class="text-sm text-slate-400 mt-2">
                    <span id="survivalBadge" class="inline-flex items-center gap-1 px-3 py-1 rounded-full text-sm font-bold"></span>
                </div>
                <p id="keyStrategy" class="text-slate-400 text-sm mt-3 max-w-md mx-auto"></p>
            </div>

            <!-- Emergency Actions -->
            <div class="mb-8 animate-slide-up delay-1">
                <div class="glass-card p-4 border border-red-500/20 bg-red-950/10">
                    <h3 class="text-sm font-bold text-red-400 mb-3 flex items-center gap-2">
                        <span>🆘</span> Emergency Actions
                    </h3>
                    <div class="flex gap-3 flex-wrap">
                        <button onclick="openEmailDrafter()" class="btn-ghost text-sm py-2 px-4 border-slate-700 hover:border-red-500/50">
                            ✉️ Draft Extension / Excuse Email
                        </button>
                    </div>
                </div>
            </div>

            <!-- Email Drafter Panel -->
            <div id="emailDrafterPanel" class="hidden mb-8 animate-slide-up">
                <div class="glass-card p-5 border border-indigo-500/20 bg-indigo-950/10">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-sm font-bold text-indigo-400">AI Email Drafter</h3>
                        <button onclick="closeEmailDrafter()" class="text-slate-400 hover:text-white">✕</button>
                    </div>
                    
                    <div class="space-y-3 mb-4">
                        <div>
                            <label class="text-xs text-slate-400 block mb-1">To: (Professor, Manager, etc.)</label>
                            <input id="emailRecipient" class="input-dark w-full text-sm py-2" placeholder="e.g. Professor Smith">
                        </div>
                        <div>
                            <label class="text-xs text-slate-400 block mb-1">Context / Excuse</label>
                            <textarea id="emailContext" class="input-dark w-full text-sm py-2" rows="2" placeholder="e.g. My computer crashed last night and I lost my progress."></textarea>
                        </div>
                        <button id="generateEmailBtn" onclick="generateCrisisEmail()" class="btn-primary w-full py-2 text-sm bg-indigo-600 hover:bg-indigo-500 text-white border-0">
                            ✨ Generate Draft
                        </button>
                    </div>

                    <div id="emailPreviewContainer" class="hidden mt-4 pt-4 border-t border-slate-700/50">
                        <h4 class="text-xs font-semibold text-slate-300 mb-2">Preview</h4>
                        <div class="bg-slate-900 rounded p-3 text-sm text-slate-300 whitespace-pre-wrap font-mono mb-3" id="emailPreviewBody">
                        </div>
                        <button id="pushToGmailBtn" onclick="pushToGmailDrafts()" class="btn-primary w-full py-2 text-sm flex justify-center items-center gap-2" style="background: #ea4335;">
                            <span>📧</span> Push to Gmail Drafts
                        </button>
                    </div>
                </div>
            </div>

            <!-- Steps -->
            <div id="stepsContainer" class="space-y-4">
                <!-- Steps render here -->
            </div>

            <!-- AI Chat Panel -->
            <div id="chatPanel" class="hidden mt-8 animate-slide-up">
                <div class="chat-panel">
                    <div class="bg-red-500/10 px-4 py-3 flex justify-between items-center">
                        <span class="text-sm font-bold text-red-400">⚡ AI Assistant — Step <span id="chatStep"></span></span>
                        <button onclick="closeChatPanel()" class="text-slate-400 hover:text-white">✕</button>
                    </div>
                    <div id="chatMessages" class="p-4 max-h-64 overflow-y-auto space-y-2">
                        <!-- Chat messages -->
                    </div>
                    <div class="p-3 border-t border-[#2D2D4E] flex gap-2">
                        <input id="chatInput" class="input-dark flex-1 text-sm" placeholder="Ask AI for help..."
                               onkeypress="if(event.key==='Enter') sendChatMessage()"
                               style="border-color: rgba(239, 68, 68, 0.3);">
                        <button onclick="sendChatMessage()" class="btn-primary px-4 text-sm" style="background: linear-gradient(135deg, #EF4444, #DC2626);">
                            Send
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        let crisisPlan = null;
        let timerInterval = null;
        let totalSeconds = 0;
        let currentStep = 0;
        let taskTitle = '';

        // Check URL params for pre-filled task
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            if (params.get('task_title')) {
                document.getElementById('crisisTask').value = params.get('task_title');
            }
        });

        function setMinutes(mins) {
            document.getElementById('crisisMinutes').value = mins;
        }

        let _crisisInProgress = false;

        async function startCrisis() {
            if (_crisisInProgress) return; // Prevent double-click

            taskTitle = document.getElementById('crisisTask').value.trim();
            const desc = document.getElementById('crisisDesc').value.trim();
            const minutes = parseInt(document.getElementById('crisisMinutes').value) || 60;

            if (!taskTitle) {
                showToast('Enter the task first!', 'warning');
                return;
            }

            // Lock button, show loading
            _crisisInProgress = true;
            const btn = document.getElementById('generateBtn');
            btn.disabled = true;
            btn.textContent = '⏳ Generating...';

            try {
                const r = await fetch('/auth/me');
                const data = await r.json();
                if (data.user && data.user.google_id) {
                    DEFAULT_USER_ID = data.user.google_id;
                } else {
                    window.location.href = '/login.html';
                    return;
                }
            } catch (e) {
                console.warn("Failed to fetch auth/me:", e);
            }

            document.getElementById('setupPhase').classList.add('hidden');
            document.getElementById('loadingPhase').classList.remove('hidden');

            // Animate loading bar
            let progress = 0;
            const statuses = [
                'Analyzing task complexity...',
                'Building step-by-step strategy...',
                'Calculating survival probability...',
                'Finalizing battle plan...',
            ];
            let statusIdx = 0;
            const loadingInterval = setInterval(() => {
                progress = Math.min(progress + Math.random() * 15, 90);
                document.getElementById('loadingBar').style.width = progress + '%';
                if (statusIdx < statuses.length && progress > statusIdx * 25) {
                    document.getElementById('loadingStatus').textContent = statuses[statusIdx++];
                }
            }, 400);

            totalSeconds = minutes * 60;

            try {
                crisisPlan = await activateCrisis(taskTitle, minutes);
            } catch (err) {
                crisisPlan = {
                    task: taskTitle,
                    time_available: minutes,
                    survival_probability: 65,
                    steps: [
                        { step: 1, title: 'Understand the requirements', duration: Math.floor(minutes * 0.1), ai_help: 'Paste the requirements — I will extract key points.' },
                        { step: 2, title: 'Create outline', duration: Math.floor(minutes * 0.1), ai_help: 'Tell me the topic — I will generate a structure.' },
                        { step: 3, title: 'Main content', duration: Math.floor(minutes * 0.5), ai_help: 'Send what you are stuck on — I will help.' },
                        { step: 4, title: 'Review and polish', duration: Math.floor(minutes * 0.2), ai_help: 'Paste your work — I will check for gaps.' },
                        { step: 5, title: 'Submit', duration: Math.floor(minutes * 0.1), ai_help: null },
                    ],
                };
            }

            // Complete loading bar
            clearInterval(loadingInterval);
            document.getElementById('loadingBar').style.width = '100%';
            document.getElementById('loadingStatus').textContent = 'Battle plan ready!';
            await new Promise(r => setTimeout(r, 400));

            // Show battle plan
            document.getElementById('loadingPhase').classList.add('hidden');
            document.getElementById('battlePhase').classList.remove('hidden');

            // Survival badge
            const survival = crisisPlan.survival_probability || 65;
            const badge = document.getElementById('survivalBadge');
            if (survival >= 75) {
                badge.innerHTML = '🟢 ' + survival + '% Survival Chance';
                badge.style.cssText = 'background: rgba(16, 185, 129, 0.15); color: #34D399; padding: 4px 12px; border-radius: 9999px;';
            } else if (survival >= 50) {
                badge.innerHTML = '🟡 ' + survival + '% Survival Chance';
                badge.style.cssText = 'background: rgba(245, 158, 11, 0.15); color: #FBBF24; padding: 4px 12px; border-radius: 9999px;';
            } else {
                badge.innerHTML = '🔴 ' + survival + '% Survival Chance';
                badge.style.cssText = 'background: rgba(239, 68, 68, 0.15); color: #F87171; padding: 4px 12px; border-radius: 9999px;';
            }

            // Key strategy
            document.getElementById('keyStrategy').textContent =
                crisisPlan.key_strategy || 'Focus on completing, not perfecting.';

            // Render steps then start timer
            renderSteps();
            startTimer();
        }

        function renderSteps() {
            const container = document.getElementById('stepsContainer');
            const steps = crisisPlan.steps || [];

            container.innerHTML = steps.map((step, i) => {
                return `
                <div class="crisis-step ${i === 0 ? 'active' : ''}" id="step-${i}" data-step="${i}">
                    <div class="flex justify-between items-start mb-2">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold
                                        ${i === 0 ? 'bg-red-500 text-white' : 'bg-red-500/20 text-red-400'}"
                                 id="stepBadge-${i}">
                                ${step.step || i + 1}
                            </div>
                            <div>
                                <h4 class="font-semibold text-sm">${escapeHtml(step.title)}</h4>
                                <span class="text-xs text-slate-500">${step.duration} minutes</span>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            ${step.ai_help ? `
                                <button data-step="${i}" data-title="${escapeHtml(step.title)}" onclick="openAiHelp(this.dataset.step, this.dataset.title)"
                                        class="text-xs px-3 py-1 rounded-full bg-red-500/15 text-red-400 hover:bg-red-500/25 transition-colors">
                                    ⚡ AI Help
                                </button>
                            ` : ''}
                            <button onclick="completeStep(${i})"
                                    class="text-xs px-3 py-1 rounded-full bg-emerald-500/15 text-emerald-400 hover:bg-emerald-500/25 transition-colors"
                                    id="completeBtn-${i}">
                                ✓ Done
                            </button>
                        </div>
                    </div>
                    ${step.ai_help ? `<p class="text-xs text-slate-500 ml-11">${escapeHtml(step.ai_help)}</p>` : ''}
                </div>
            `;}).join('');
        }

        function completeStep(index) {
            const stepEl = document.getElementById(`step-${index}`);
            stepEl.classList.remove('active');
            stepEl.classList.add('completed');
            document.getElementById(`stepBadge-${index}`).innerHTML = '✓';
            document.getElementById(`stepBadge-${index}`).className =
                'w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold bg-emerald-500 text-white';

            // Activate next step
            const nextStep = document.getElementById(`step-${index + 1}`);
            if (nextStep) {
                nextStep.classList.add('active');
                document.getElementById(`stepBadge-${index + 1}`).className =
                    'w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold bg-red-500 text-white';
            }

            // Update progress
            const steps = crisisPlan.steps || [];
            const completedCount = document.querySelectorAll('.crisis-step.completed').length;
            const progress = (completedCount / steps.length) * 100;
            document.getElementById('crisisProgress').style.width = `${progress}%`;

            if (completedCount === steps.length) {
                showToast('🎉 ALL STEPS COMPLETE! You survived!', 'success');
                clearInterval(timerInterval);
            }
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval); // prevent duplicates
            let lastTick = Date.now();
            updateTimerDisplay();
            timerInterval = setInterval(() => {
                const now = Date.now();
                const elapsed = Math.round((now - lastTick) / 1000);
                lastTick = now;
                totalSeconds -= elapsed;
                updateTimerDisplay();

                if (totalSeconds <= 0) {
                    clearInterval(timerInterval);
                    showToast("Time is up!", 'warning');
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const mins = Math.floor(Math.abs(totalSeconds) / 60);
            const secs = Math.abs(totalSeconds) % 60;
            const timer = document.getElementById('crisisTimer');
            timer.textContent = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;

            // Warning animation when < 10 minutes
            if (totalSeconds < 600 && totalSeconds > 0) {
                timer.classList.add('warning');
            }
            // Overtime
            if (totalSeconds < 0) {
                timer.textContent = `-${timer.textContent}`;
                timer.style.color = '#EF4444';
            }
        }

        // AI Chat
        function openAiHelp(stepIndex, stepTitle) {
            currentStep = stepIndex;
            document.getElementById('chatPanel').classList.remove('hidden');
            document.getElementById('chatStep').textContent = stepIndex + 1;
            document.getElementById('chatMessages').innerHTML = `
                <div class="chat-message assistant">
                    I'm here to help with Step ${stepIndex + 1}: "<strong>${escapeHtml(stepTitle)}</strong>". What do you need?
                </div>
            `;
            document.getElementById('chatInput').focus();
        }

        function closeChatPanel() {
            document.getElementById('chatPanel').classList.add('hidden');
        }

        async function sendChatMessage() {
            const input = document.getElementById('chatInput');
            const question = input.value.trim();
            if (!question) return;

            const messages = document.getElementById('chatMessages');

            // Show user message
            messages.innerHTML += `<div class="chat-message user">${escapeHtml(question)}</div>`;
            input.value = '';

            // Show typing indicator
            messages.innerHTML += `<div class="chat-message assistant" id="typing">Thinking...</div>`;
            messages.scrollTop = messages.scrollHeight;

            try {
                const step = (crisisPlan.steps || [])[currentStep] || {};
                const result = await getCrisisAssist(taskTitle, currentStep + 1, step.title || '', question);

                document.getElementById('typing')?.remove();
                messages.innerHTML += `<div class="chat-message assistant">${escapeHtml(result.assistance || 'I couldn\'t generate a response. Try rephrasing your question.')}</div>`;
            } catch (err) {
                document.getElementById('typing')?.remove();
                messages.innerHTML += `<div class="chat-message assistant">Sorry, I can't connect to AI right now. Try breaking this step into the smallest possible action and just start.</div>`;
            }

            messages.scrollTop = messages.scrollHeight;
        }

        // Email Drafter Functions
        let currentDraftBody = "";

        function openEmailDrafter() {
            document.getElementById('emailDrafterPanel').classList.remove('hidden');
        }

        function closeEmailDrafter() {
            document.getElementById('emailDrafterPanel').classList.add('hidden');
        }

        async function generateCrisisEmail() {
            const recipient = document.getElementById('emailRecipient').value.trim();
            const context = document.getElementById('emailContext').value.trim();

            if (!recipient) {
                showToast("Please enter a recipient", "warning");
                return;
            }

            const btn = document.getElementById('generateEmailBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '⏳ Generating...';
            btn.disabled = true;

            try {
                // We'll call the draft-email endpoint. It will return the body and possibly push to Gmail if connected, 
                // but let's actually just generate it first, and pushing to Gmail can happen directly there or in two steps.
                // Wait, the API endpoint `/crisis/draft-email` generates AND pushes. 
                // Let's modify the flow to just call the API. If Gmail is connected, it creates the draft!
                
                const response = await api.post('/crisis/draft-email', {
                    user_id: DEFAULT_USER_ID, // Ensure app.js sets this correctly, or backend parses session
                    task_title: taskTitle,
                    recipient: recipient,
                    context: context
                });

                document.getElementById('emailPreviewContainer').classList.remove('hidden');
                
                if (response.draft_id) {
                    document.getElementById('emailPreviewBody').textContent = "Draft successfully created in your Gmail account!";
                    document.getElementById('pushToGmailBtn').innerHTML = '<span>↗️</span> Open Gmail Drafts';
                    document.getElementById('pushToGmailBtn').onclick = () => window.open(response.draft_url, '_blank');
                    showToast(response.message, "success");
                } else {
                    document.getElementById('emailPreviewBody').textContent = `Subject: ${response.subject}\n\n${response.body}`;
                    currentDraftBody = response.body;
                    document.getElementById('pushToGmailBtn').innerHTML = '<span>🔗</span> Connect Gmail to auto-push';
                    document.getElementById('pushToGmailBtn').onclick = () => {
                        localStorage.setItem('pending_gmail_subject', response.subject);
                        localStorage.setItem('pending_gmail_body', response.body);
                        localStorage.setItem('pending_gmail_recipient', document.getElementById('emailRecipient').value);
                        window.location.href = '/auth/login?scope=gmail&redirect_url=' + encodeURIComponent(window.location.pathname + window.location.search);
                    };
                }

            } catch (err) {
                console.error(err);
                showToast("Failed to generate email", "error");
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }
        
        // Ensure DEFAULT_USER_ID is set via auth/me if possible
        fetch('/auth/me').then(r => r.json()).then(async data => {
            if (data.user && data.user.google_id) {
                window.DEFAULT_USER_ID = data.user.google_id;
                
                // Check if there is a pending draft to push
                const pendingSubject = localStorage.getItem('pending_gmail_subject');
                if (pendingSubject) {
                    const pendingBody = localStorage.getItem('pending_gmail_body');
                    const pendingRecipient = localStorage.getItem('pending_gmail_recipient');
                    localStorage.removeItem('pending_gmail_subject');
                    localStorage.removeItem('pending_gmail_body');
                    localStorage.removeItem('pending_gmail_recipient');

                    showToast("Pushing drafted email to Gmail...", "info");
                    try {
                        const res = await api.post('/crisis/push-draft', {
                            user_id: window.DEFAULT_USER_ID,
                            recipient: pendingRecipient,
                            subject: pendingSubject,
                            body: pendingBody
                        });
                        if (res.success) {
                            showToast("Draft synced to Gmail!", "success");
                            // Reveal email preview box
                            document.getElementById('emailPreviewBox').classList.remove('hidden');
                            document.getElementById('emailPreviewBody').textContent = "Draft successfully created in your Gmail account!";
                            document.getElementById('pushToGmailBtn').innerHTML = '<span>↗️</span> Open Gmail Drafts';
                            document.getElementById('pushToGmailBtn').onclick = () => window.open(res.draft_url, '_blank');
                            
                            // Auto open in a new tab if popup is allowed
                            setTimeout(() => { window.open(res.draft_url, '_blank'); }, 500);
                        } else {
                            showToast("Failed to push draft to Gmail.", "error");
                        }
                    } catch(e) {
                        console.error("Failed to push draft:", e);
                        showToast("Error pushing draft.", "error");
                    }
                }
            }
        }).catch(() => {});
    </script>

</body>
</html>
